<!--
    GitHub WebEditor (GHWE)
    - - - - - - - - - - - -
    This application is designed to be used by GitHub users who currently have websites 
    hosted using GitHub Pages and have static JSON files within that repository that requires 
    regular updates.

    A user will login using their GitHub account, and then be able to edit the specified JSON 
    files within the selected Repository of which the ghwe_config.json and ghwe_log.json files 
    are located.
    
    The ghwe_config.json file is used to specify the site overall informations, as well as the
    list of JSON files that the user will be able to edit.
    
    The ghwe_log.json file is used to keep a log of changes made to the JSON files specified in 
    the ghwe_config.json file. This log is ONLY updated by a logged in user who successfully makes
    changes to the JSON files. The log is also updated when a user makes changes to the 
    'ghwe_config.json' file.
-->
<!DOCTYPE html>
<html lang="en">
    <script>
        // White Label Configuration
        const site_logo = "https://oakshift.co.uk/source/images/logos/logo-b.png"
        const site_name = "WebEditor";
        const site_description = "GitHub WebEditor is a web application that allows users to edit JSON files in their GitHub repositories.";
        const site_share_landscape = "https://oakshiftsoftware.github.io/source/images/headers/img-5.png";
    </script>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <script>
            const site_head = `
                <meta property="og:title" content="${site_name}" />
                <meta property="og:description" content="${site_description}" />
                <meta property="og:image" content="${site_share_landscape}" />

                <meta property="twitter:title" content="${site_name}" />
                <meta property="twitter:description" content="${site_description}" />
                <meta property="twitter:image" content="${site_share_landscape}" />

                <title>${site_name}</title>
            `;
            document.write(site_head);
        </script>

        <!-- CSS Styling Section -->
        <style>
            /*
                CSS Styling Here
            */
            :root {
                --wfa: -webkit-fill-available;
                --color-01: #18bc9c;
                --color-02: #333333;
                --color-03: #f4f4f4;
            }

            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background-color: var(--color-03);
                color: var(--color-02);
            }

            /* Header Styling */
            header {
                display: inline-flex;
                width: var(--wfa);
                justify-content: space-between;
                padding: 2rem 4rem;
            }

            div.brand {
                display: inline-flex;
                align-items: center;
                gap: 1rem;
            }

            img.brand-logo {
                width: 75px;
                height: auto;
                object-fit: contain;
            }

            p.brand-name {
                font-size: 1.5rem;
                font-weight: bold;
                margin: 0;
            }

            div.navigation {
                display: inline-flex;
                align-items: center;
                gap: 1rem;
            }

            a.nav-link {
                text-decoration: none;
                color: var(--color-02);
                font-weight: bold;
                font-size: 1rem;
            }

            a.nav-link:hover {
                color: var(--color-01);
            }

            /* Main Content Styling */
            main {
                padding: 2rem 4rem;
            }

            page-tag {
                display: block;
                margin-bottom: 2rem;
            }

            page-tag.hidden {
                display: none;
            }

            page-tag h2 {
                font-size: 2rem;
                margin-top: 0;
                margin-bottom: 1rem;
            }

            /* Footer Styling */
            footer {
                padding: 2rem 4rem;
                background-color: var(--color-02);
                color: var(--color-03);
                text-align: center;
            }

            footer small {
                font-style: italic;
            }

        </style>
    </head>
    <body>
        <!-- HTML Section (Header) -->
        <header>
            <div class="brand">
                <script>
                    document.write(`<img src="${site_logo}" class="brand-logo" /> <p class="brand-name">${site_name}</p>`);
                </script>
            </div>
            <div class="navigation">
                <a href="#home" class="nav-link">Home</a>
                <a href="#editor" class="nav-link">Editor</a>
                <a href="#about" class="nav-link">About</a>
            </div>
        </header>

        <!-- HTML Section (Main) -->
        <main>
            <!-- Home Page -->
            <page-tag class="home" id="home">
                <h2>Welcome to GitHub WebEditor</h2>
            </page-tag>

            <!-- Editor Page -->
            <page-tag class="editor hidden" id="editor">
                <h2>Editor</h2>
            </page-tag>

            <!-- About Page -->
            <page-tag class="about hidden" id="about">
                <h2>About</h2>
            </page-tag>
        </main>

        <!-- HTML Section (Footer) -->
        <footer>
            <p>
                &copy; <script>document.write(new Date().getFullYear());</script> GitHub WebEditor. All rights reserved.
            </p>
            <small>Website by <a href="https://oakshift.co.uk/">Oakshift Software</a></small>
        </footer>

        <!-- JavaScript Section -->
        <script>
            // Constants
            const requiredFiles = ["ghwe_config.json", "ghwe_log.json"];

            const config_ghwe = String(requiredFiles[0]);
            const log_ghwe = String(requiredFiles[1]);

            async function checkUrlExists(url) {
                try {
                    let _response = await fetch(url, { method: 'HEAD' });
                    return _response.ok;
                } catch (error) {
                    return false;
                }
            }

            if (checkUrlExists(config_ghwe) && checkUrlExists(log_ghwe)) {
                console.log(`File '${config_ghwe}' exists.`);
                console.log(`File '${log_ghwe}' exists.`);
            } else {
                console.error(`File '${config_ghwe}' or '${log_ghwe}' does not exist.`);
            }

            async function loadGhweFile() {
                let file_path = `./${config_ghwe}`;
                try {
                    // Success
                    let response = await fetch(file_path);
                    if (!response.ok) throw new Error('File could not be found');
                    const data = await response.json();
                    return data;
                } catch (error) {
                    // Failed
                    return null;
                }
            }

            let ghwe_data = loadGhweFile();
            console.log(ghwe_data);


            // Hash-routed Navigation
            const pages_list = [
                ["home", "Home"], 
                ["editor", "Editor"], 
                ["about", "About"]
            ];
        </script>
    </body>
</html>
