    <body>
        <!-- HTML Section (Header) -->
        <header>
            <div class="brand">
                <img src="" class="brand-logo" />
                <p class="brand-name">GitHub WebEditor</p>
            </div>
            <div class="navigation">
                <a href="#home" class="nav-link">Home</a>
                <a href="#editor" class="nav-link">Editor</a>

        <!-- HTML Section (Main) -->

            <!-- Home Page -->
            <page-tag class="home" id="home">
                <h2>Welcome to GitHub WebEditor</h2>
            </page-tag>

            <!-- Editor Page -->
            <page-tag class="editor" id="editor">

            </p>
            <small>Website by <a href="https://oakshift.co.uk/">Oakshift Software</a></small>
        </footer>

        <!-- JavaScript Section -->
        <script>
            // Constants
            const requiredFiles = [
                "ghwe_config.json", 
                "ghwe_log.json"
            ];

            const config_ghwe = String(requiredFiles[0]);
            const log_ghwe = String(requiredFiles[1]);

            async function checkUrlExists(url) {
                try {
                    let _response = await fetch(url, { method: 'HEAD' });
                    return _response.ok;
                } catch (error) {
                    return false;
                }
            }

            if (checkUrlExists(config_ghwe) && checkUrlExists(log_ghwe)) {
                console.log(`File '${config_ghwe}' exists.`);
                console.log(`File '${log_ghwe}' exists.`);
            } else {
                console.error(`File '${config_ghwe}' or '${log_ghwe}' does not exist.`);
            }

            async function loadGhweFile() {
                let file_path = `./${config_ghwe}`;
                try {
                    // Success
                    let response = await fetch(file_path);
                    if (!response.ok) throw new Error('File could not be found');
                    const data = await response.json();
                    return data;
                } catch (error) {
                    // Failed
                    return null;
                }
            }

            async function readJsonFile(file_path) {
                try {
                    let response = await fetch(file_path);
                    if (!response.ok) throw new Error('File could not be found');
                    const data = await response.json();
                    return data;
                } catch (error) {
                    return null;
                }
            }

            const ghwe_data = loadGhweFile();
            console.log(ghwe_data.response);


            // Hash-routed Navigation
            const pages_list = [
                ["home", "Home"], 
                ["editor", "Editor"], 
                ["about", "About"]
            ];
        </script>
    </body>
